name: terraform-docs

# Read-only check that the README Inputs/Outputs block is current. Pinned
# terraform-docs version so local `terraform-docs .` and CI produce identical output
# (no gh-action bundled-version drift). Fails the PR if the block is stale — run
# `terraform-docs .` locally and commit. Read-only, so it also works on fork PRs.
on:
  pull_request:

permissions:
  contents: read

env:
  TERRAFORM_DOCS_VERSION: "0.24.0"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install terraform-docs (pinned)
        run: |
          curl -sSLo /tmp/td.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v${TERRAFORM_DOCS_VERSION}/terraform-docs-v${TERRAFORM_DOCS_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/td.tar.gz -C /tmp terraform-docs
          sudo install /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version
      - name: Check README is up to date
        run: |
          terraform-docs markdown table --config .terraform-docs.yml \
            --output-file README.md --output-mode inject .
          git diff --exit-code -- README.md \
            || { echo "::error::README terraform-docs block is stale — run 'terraform-docs .' and commit."; exit 1; }
