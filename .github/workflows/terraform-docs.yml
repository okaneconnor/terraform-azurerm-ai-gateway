name: terraform-docs

# Keeps the README Inputs/Outputs block in sync with the variables/outputs using the
# official terraform-docs action (no runtime install, no version to match locally).
# It regenerates the block and commits the fix back to the PR branch, so the action is
# the single source of truth. Note: git-push can't write to forked PR branches — fine
# for same-repo PRs; switch to fail-on-diff if you start taking external contributions.
on:
  pull_request:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Render terraform-docs into README.md and push back to the PR branch
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: .
          config-file: .terraform-docs.yml
          output-file: README.md
          output-method: inject
          git-push: "true"
          git-commit-message: "docs: terraform-docs auto-update"
