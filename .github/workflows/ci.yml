name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: "1.9.8"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive

  validate:
    name: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [".", "examples/basic", "examples/complete"]
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform validate (${{ matrix.dir }})
        working-directory: ${{ matrix.dir }}
        run: |
          terraform init -backend=false
          terraform validate

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -backend=false
      - run: terraform test

  docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: terraform-docs (check README is up to date)
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: .
          config-file: .terraform-docs.yml
          output-file: README.md
          output-method: inject
          fail-on-diff: true

  scan:
    name: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .
      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          compact: true
